# ============================================================
# GitHub Actions: VitePress ドキュメントを gh-pages ブランチへデプロイ
#
# この workflow の目的：
#   - main ブランチに push されたら自動で VitePress をビルド
#   - docs/.vitepress/dist の内容を gh-pages ブランチへそのままコピー
#   - GitHub Pages は gh-pages ブランチを公開するだけで OK
#
# この方式のメリット：
#   - main ブランチはソースコードだけでクリーンに保てる
#   - dist を main に含める必要がない
#   - GitHub Pages の「docs フォルダ縛り」を回避できる
#   - デプロイは Actions が自動でやってくれる
#
# 必要な GitHub Pages 設定：
#   Settings → Pages → Source: "Deploy from a branch"
#   Branch: gh-pages / Folder: /
#
# ============================================================

name: Deploy VitePress to gh-pages

on:
  push:
    branches: [ main ]  # main ブランチに push されたら実行

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub が用意する Linux 環境で実行

    steps:
      # --------------------------------------------------------
      # 1. リポジトリをチェックアウト
      #    fetch-depth: 0 にすることで gh-pages ブランチへの push が可能になる
      # --------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --------------------------------------------------------
      # 2. Node.js をセットアップ
      #    VitePress が動作する Node バージョンを指定（20 を推奨）
      # --------------------------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # --------------------------------------------------------
      # 3. npm パッケージをインストール
      #    CI 用に npm ci を使う（package-lock.json に忠実）
      # --------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # --------------------------------------------------------
      # 4. VitePress のドキュメントをビルド
      #    docs/.vitepress/dist に静的ファイルが生成される
      # --------------------------------------------------------
      - name: Build VitePress site
        run: npm run docs:build

      # --------------------------------------------------------
      # 5. gh-pages ブランチへデプロイ
      #    docs/.vitepress/dist の内容を gh-pages ブランチに上書き push
      #    GitHub Pages は gh-pages ブランチをそのまま公開する
      # --------------------------------------------------------
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub が自動で用意するトークン
          publish_dir: docs/.vitepress/dist          # 公開したいフォルダ
          publish_branch: gh-pages                   # 公開用ブランチ
