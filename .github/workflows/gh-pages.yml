name: VitePress サイトをデプロイ

# 実行タイミングの設定
on:
  push:
    branches: [main] # main ブランチに push された時に動かす
  workflow_dispatch: # 必要に応じて手動実行もできるようにする

# GitHub Pages への書き込み権限などを設定
permissions:
  contents: read # コードの読み取り権限
  pages: write    # Pages への書き込み権限
  id-token: write # デプロイの認証用

# 二重実行の制御（古いジョブをキャンセルして最新だけ動かす）
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ビルドジョブ：ソースコードから HTML を生成する
  build:
    runs-on: ubuntu-latest
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Git の全履歴を取得（VitePress の更新日表示などに必要）

      - name: Node.js のセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm # パッケージのキャッシュを有効にして高速化

      - name: Pages の初期設定
        uses: actions/configure-pages@v4

      - name: 依存ライブラリのインストール
        run: npm install

      - name: ライブラリをビルド
        run: npm run build

      - name: VitePress ビルド
        run: npm run docs:build # docs/.vitepress/dist に HTML が生成される

      - name: 成果物のアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          # 公開したいディレクトリを指定（ここがあなたの要望の核！）
          path: docs/.vitepress/dist

  # デプロイジョブ：ビルドされた成果物をネットに公開する
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # 公開後の URL をログに出力
    needs: build # build ジョブが成功してから実行する
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        # これが「公開ボタン」を押す役割の Action です
        uses: actions/deploy-pages@v4
        